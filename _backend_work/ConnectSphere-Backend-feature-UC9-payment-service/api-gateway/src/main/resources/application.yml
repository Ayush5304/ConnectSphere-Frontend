server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: auth-service-oauth2
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/oauth2/**,/login/oauth2/**

        - id: post-service
          uri: lb://POST-SERVICE
          predicates:
            - Path=/api/posts,/api/posts/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: comment-service
          uri: lb://COMMENT-SERVICE
          predicates:
            - Path=/api/comments,/api/comments/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: like-service
          uri: lb://LIKE-SERVICE
          predicates:
            - Path=/api/likes,/api/likes/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: follow-service
          uri: lb://FOLLOW-SERVICE
          predicates:
            - Path=/api/follows/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications,/api/notifications/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: media-service
          uri: lb://MEDIA-SERVICE
          predicates:
            - Path=/api/media/**,/api/stories,/api/stories/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: media-files
          uri: lb://MEDIA-SERVICE
          predicates:
            - Path=/media/files/**

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

        - id: search-service
          uri: lb://SEARCH-SERVICE
          predicates:
            - Path=/api/search,/api/search/**,/api/hashtags/**
          filters:
            - StripPrefix=1
            - JwtAuthFilter

# ✅ JWT FIX
jwt:
  secret: ${JWT_SECRET}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
