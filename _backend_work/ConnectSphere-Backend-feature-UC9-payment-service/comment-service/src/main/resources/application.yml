server:
  port: 8083

spring:
  application:
    name: comment-service

  datasource:
    url: jdbc:mysql://localhost:3306/connectsphere_comment_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

# 🔗 Inter-service communication
auth:
  service:
    url: http://localhost:8081

post:
  service:
    url: http://localhost:8082

# Logging
logging:
  level:
    com.connectsphere: DEBUG