server:
  port: 8085

spring:
  application:
    name: follow-service

  datasource:
    url: jdbc:mysql://localhost:3306/connectsphere_follow_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

# 🔗 Inter-service communication
auth:
  service:
    url: http://localhost:8081

# (Optional: if you want user profile later)
user:
  service:
    url: http://localhost:8086

# Logging
logging:
  level:
    com.connectsphere: DEBUG