server:
  port: 8082

spring:
  application:
    name: post-service

  datasource:
    url: jdbc:mysql://localhost:3306/connectsphere_post_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

# ✅ FIX ADDED HERE
auth:
  service:
    url: http://localhost:8081
 
 # (optional - keep if needed)
search:
  service:
    url: http://localhost:8083

logging:
  level:
    com.connectsphere: DEBUG